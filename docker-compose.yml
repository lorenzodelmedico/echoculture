version: '3.8'

services:
  # Base de données pour les données propres (Relational)
  db_postgres:
    image: postgres:16-alpine
    container_name: echoculture_pg
    environment:
      POSTGRES_USER: lorenzo
      POSTGRES_PASSWORD: echopassword
      POSTGRES_DB: echoculture
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: echoculture_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db_postgres

  # Base de données pour le scraping brut (NoSQL)
  db_mongodb:
    image: mongo:7.0
    container_name: echoculture_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongopassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo_express:
    image: mongo-express:latest
    container_name: echoculture_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: mongopassword
      # On utilise le nom du service "db_mongodb" dans l'URL
      ME_CONFIG_MONGODB_URL: mongodb://admin:mongopassword@db_mongodb:27017/
    depends_on:
      - db_mongodb

volumes:
  pg_data:
  mongo_data:
